  <!--
  ═══════════════════════════════════════════════════════
  SUPABASE SETUP — Run this SQL in your Supabase SQL Editor
  ═══════════════════════════════════════════════════════

  create extension if not exists "uuid-ossp";

  create table profiles (
    id uuid references auth.users on delete cascade primary key,
    display_name text not null,
    created_at timestamptz default now()
  );
  alter table profiles enable row level security;
  create policy "insert own" on profiles for insert with check (auth.uid() = id);
  create policy "read own" on profiles for select using (auth.uid() = id);
  create policy "update own" on profiles for update using (auth.uid() = id);

  create table responses (
    id uuid default uuid_generate_v4() primary key,
    respondent_id uuid references profiles(id) on delete cascade,
    relationship_type text check (relationship_type in ('social','both')),
    additional_text text,
    submitted_at timestamptz default now()
  );
  alter table responses enable row level security;
  create policy "insert own response" on responses for insert with check (auth.uid() = respondent_id);
  create policy "read own responses" on responses for select using (auth.uid() = respondent_id);

  create table answers (
    id uuid default uuid_generate_v4() primary key,
    response_id uuid references responses(id) on delete cascade,
    question_id text not null,
    choice_index integer not null,
    created_at timestamptz default now()
  );
  alter table answers enable row level security;
  create policy "insert answer" on answers for insert with check (
    exists (select 1 from responses where responses.id = response_id and responses.respondent_id = auth.uid())
  );

  Also go to Authentication → Settings and disable "Enable email confirmations"
  so users can sign up without verifying their email first.

  ═══════════════════════════════════════════════════════
  SCHEMA MIGRATION — Run this in the Supabase SQL editor
  ═══════════════════════════════════════════════════════

  -- 1. Add respondent info columns (no auth account needed)
  alter table responses add column if not exists respondent_name  text;
  alter table responses add column if not exists respondent_email text;

  -- 2. Make respondent_id optional (no longer required)
  alter table responses alter column respondent_id drop not null;

  -- 3. Add custom_answer column for "Other" answers
  alter table answers add column if not exists custom_answer text;

  -- 4. Allow anyone (anon) to insert responses — no login required
  drop policy if exists "insert own response" on responses;
  create policy "insert response" on responses
    for insert with check (true);

  -- 5. Allow anyone to insert answers (just needs a valid response_id)
  drop policy if exists "insert answer" on answers;
  create policy "insert answer" on answers
    for insert with check (
      exists (select 1 from responses where responses.id = response_id)
    );

  -- 6. Owner-only read for responses
  drop policy if exists "read own responses" on responses;
  drop policy if exists "read all responses" on responses;
  create policy "owner read responses" on responses
    for select using (auth.email() = 'mmookkjjtt0@gmail.com');

  -- 7. Owner-only read for answers
  drop policy if exists "read own answers" on answers;
  drop policy if exists "read all answers" on answers;
  create policy "owner read answers" on answers
    for select using (auth.email() = 'mmookkjjtt0@gmail.com');

  ═══════════════════════════════════════════════════════
  MIGRATION 4 — Public results page, drop admin (run once in SQL editor)
  ═══════════════════════════════════════════════════════

  -- 1. Drop admin scaffolding from MIGRATION 3 (safe if MIGRATION 3 was never run)
  drop policy if exists admin_select_responses on public.responses;
  drop policy if exists admin_select_answers   on public.answers;
  drop policy if exists owner_select_responses on public.responses;
  drop policy if exists owner_select_answers   on public.answers;
  drop policy if exists "owner read responses" on public.responses;
  drop policy if exists "owner read answers"   on public.answers;
  drop function if exists public.is_admin();
  drop table if exists public.admins;

  -- 2. Public, PII-stripped view of responses.
  --    Views run as their owner by default, bypassing RLS on the underlying
  --    table — so the view is the security boundary. Email and respondent_id
  --    are NOT in this view, so they cannot be selected via PostgREST.
  create or replace view public.responses_public as
    select id, respondent_name, relationship_type, additional_text, submitted_at
    from public.responses;

  grant select on public.responses_public to anon, authenticated;

  -- 3. Allow anon to read answers (no PII columns on this table).
  --    Inserts are still gated by the existing "insert answer" policy + FK check.
  drop policy if exists public_read_answers on public.answers;
  create policy public_read_answers on public.answers
    for select to anon, authenticated using (true);

  ═══════════════════════════════════════════════════════
  -->

  <style>

    @font-face {
      font-family: 'MaskingRenta';
      src: url('fonts/MaskingRenta.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg:           #000000;
      --navy:         #0B0F1A;
      --card-bg:      rgba(11, 15, 26, 0.78);
      --surface:      rgba(255, 255, 255, 0.04);
      --primary:      #818CF8;
      --primary-deep: #6366F1;
      --primary-glow: rgba(129, 140, 248, 0.32);
      --cyan:         #22D3EE;
      --cyan-glow:    rgba(34, 211, 238, 0.2);
      --text:         #F1F5F9;
      --text-mid:     rgba(241, 245, 249, 0.52);
      --text-dim:     rgba(241, 245, 249, 0.28);
      --border:       rgba(255, 255, 255, 0.08);
      --border-hi:    rgba(255, 255, 255, 0.13);
      --radius:       22px;
      --radius-sm:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      margin: 0;
      min-height: 100dvh;
      background-color: var(--bg);
      background-image: radial-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 50% -10%, rgba(99, 102, 241, 0.18) 0%, transparent 58%),
        radial-gradient(ellipse 55% 45% at 92% 100%, rgba(34, 211, 238, 0.09) 0%, transparent 52%),
        radial-gradient(ellipse 45% 35% at 4% 88%, rgba(129, 140, 248, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    [lang="ar"] body,
    [lang="ar"] * { font-family: 'Noto Kufi Arabic', sans-serif; }
    /* Brand/logo text only — decorative */
    .brand { font-family: 'MaskingRenta', 'Space Grotesk', sans-serif; font-weight: normal; }
    [lang="ar"] .brand { font-family: 'Noto Kufi Arabic', sans-serif; }
    /* All headings and content — clean and readable */
    .display { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    [lang="ar"] .display { font-family: 'Noto Kufi Arabic', sans-serif; }
    .mono { font-family: 'DM Mono', monospace; }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Screen layout ── */
    .screen-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      position: relative;
      overflow: hidden;
    }

    /* ── Fullscreen background image + overlay ── */
    .page-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      z-index: 0;
    }
    .page-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .page-content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Glass card ── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: var(--radius);
      border: 1px solid var(--border-hi);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.025) inset,
        0 8px 40px rgba(0, 0, 0, 0.55),
        0 32px 80px rgba(0, 0, 0, 0.3);
    }

    /* ── Gradient logo text ── */
    .logo-grad {
      background: linear-gradient(120deg, var(--primary) 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Primary button ── */
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary) 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 1rem;
      padding: 15px 28px;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      letter-spacing: -0.015em;
      transform: translateY(0);
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.22s ease;
      box-shadow: 0 4px 28px var(--primary-glow), 0 1px 0 rgba(255,255,255,0.14) inset;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px var(--primary-glow), 0 1px 0 rgba(255,255,255,0.14) inset; }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: translateY(0); box-shadow: 0 3px 16px var(--primary-glow); }
    .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

    /* ── Ghost button ── */
    .btn-ghost {
      background: var(--surface);
      color: var(--text-mid);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-weight: 500;
      font-size: 0.95rem;
      padding: 14px 24px;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      letter-spacing: -0.01em;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }
    .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); background: rgba(255,255,255,0.07); }

    /* ── Inputs ── */
    .input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .input:focus {
      border-color: var(--primary);
      background: rgba(129, 140, 248, 0.05);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .input::placeholder { color: var(--text-dim); }
    textarea.input { resize: none; min-height: 120px; }

    /* ── Choice buttons ── */
    .choice-btn {
      width: 100%;
      text-align: start;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 15px 18px;
      cursor: pointer;
      font-size: 0.94rem;
      font-weight: 500;
      color: var(--text-mid);
      font-family: inherit;
      line-height: 1.45;
      transform: translateY(0);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s ease, color 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .choice-btn:hover {
      border-color: rgba(129, 140, 248, 0.45);
      background: rgba(129, 140, 248, 0.07);
      color: var(--text);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    .choice-btn.selected {
      border-color: var(--primary);
      background: rgba(129, 140, 248, 0.11);
      color: var(--text);
      font-weight: 600;
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.28), 0 6px 32px rgba(129, 140, 248, 0.18);
    }

    /* Choice letter badge */
    .choice-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      border-radius: 8px;
      font-size: 0.68rem;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
      transition: background 0.2s ease, color 0.2s ease;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text-dim);
    }
    .choice-btn.selected .choice-letter {
      background: var(--primary-deep);
      color: #fff;
    }

    /* ── Relationship cards ── */
    .rel-card {
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      cursor: pointer;
      text-align: start;
      font-family: inherit;
      color: var(--text);
      transform: translateY(0);
      transition: border-color 0.25s ease, transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.22s ease, background 0.22s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .rel-card:hover {
      border-color: rgba(129, 140, 248, 0.5);
      transform: translateY(-5px);
      box-shadow: 0 18px 52px rgba(0,0,0,0.45), 0 0 0 1px rgba(129,140,248,0.18);
      background: rgba(129, 140, 248, 0.045);
    }

    /* ── Language cards ── */
    .lang-card {
      flex: 1;
      background: var(--card-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 34px 20px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--text);
      transform: translateY(0);
      transition: border-color 0.25s ease, transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.22s ease, background 0.22s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .lang-card:hover {
      border-color: rgba(129, 140, 248, 0.5);
      transform: translateY(-7px);
      box-shadow: 0 20px 56px rgba(0,0,0,0.45), 0 0 0 1px rgba(129,140,248,0.18);
      background: rgba(129, 140, 248, 0.05);
    }

    /* ── Progress bar ── */
    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-deep), var(--cyan));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 10px rgba(129, 140, 248, 0.75), 0 0 22px rgba(129, 140, 248, 0.3);
    }

    /* ── Error message ── */
    .error-msg {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.22);
      color: #FCA5A5;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.88rem;
      font-weight: 500;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-top-color: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-inline-end: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tab toggle ── */
    .tab-toggle {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
    }
    .tab-toggle button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: transparent;
      color: var(--text-mid);
      transition: background 0.2s ease, color 0.2s ease;
    }
    .tab-toggle button.active {
      background: rgba(129, 140, 248, 0.16);
      color: var(--primary);
    }

    /* ── Hero glyph ── */
    .hero-mark {
      width: 96px; height: 96px;
      background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary) 55%, var(--cyan) 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      box-shadow: 0 16px 52px var(--primary-glow), 0 4px 12px rgba(0, 0, 0, 0.5);
      animation: glowPulse 3.5s ease-in-out infinite;
    }

    /* ── Animations ── */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 16px 52px var(--primary-glow), 0 4px 12px rgba(0,0,0,0.5); }
      50% { box-shadow: 0 20px 72px rgba(129,140,248,0.48), 0 0 44px rgba(34,211,238,0.16), 0 4px 12px rgba(0,0,0,0.5); }
    }

    @keyframes popIn {
      0% { transform: scale(0.4); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-in { animation: popIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    @keyframes floatUp {
      0% { transform: translateY(22px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .float-up { animation: floatUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .float-up-1 { animation-delay: 0.05s; }
    .float-up-2 { animation-delay: 0.13s; }
    .float-up-3 { animation-delay: 0.22s; }
    .float-up-4 { animation-delay: 0.32s; }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── RTL ── */
    [dir="rtl"] .choice-btn,
    [dir="rtl"] .rel-card { text-align: start; }
  </style>
</head>

    async function go(renderFn, dir = 1) {
      const el = document.getElementById('app');
      el.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
      el.style.opacity    = '0';
      el.style.transform  = `translateY(${dir * 10}px)`;
      await sleep(200);

      el.innerHTML = renderFn();
      bindEvents();

      el.style.transition = 'none';
      el.style.transform  = `translateY(${dir * -10}px)`;
      el.offsetHeight;

      el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      el.style.opacity    = '1';
      el.style.transform  = 'translateY(0)';

      setTimeout(() => {
        el.style.transition = '';
        el.style.transform  = '';
        el.style.opacity    = '';
      }, 350);
    }

    async function submitResponse() {
      S.loading = true;
      const btnEl = document.getElementById('submit-btn');
      const errEl = document.getElementById('extra-error');
      if (btnEl) { btnEl.disabled = true; btnEl.innerHTML = `<span class="spinner"></span>`; }
      if (errEl) errEl.style.display = 'none';

      function showSubmitError(msg) {
        S.loading = false;
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = t('submitBtn'); }
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = msg || t('errGeneric'); }
      }

      try {
        const newId = crypto.randomUUID();

        const { error: re } = await sb.from('responses').insert({
          id: newId,
          respondent_name:  S.respondentName  || null,
          respondent_email: S.respondentEmail || null,
          relationship_type: S.rel,
          additional_text: S.additionalText || null,
        });

        if (re) { showSubmitError(re.message || t('errGeneric')); return; }

        const ansRows = S.answers.map(a => ({
          response_id: newId,
          question_id: a.questionId,
          choice_index: a.choiceIndex,
          custom_answer: a.otherText || null,
        }));

        if (ansRows.length > 0) {
          const { error: ae } = await sb.from('answers').insert(ansRows);
          if (ae) { showSubmitError(ae.message || t('errGeneric')); return; }
        }

        S.loading = false;
        launchConfetti();
        go(renderThankyou);
      } catch (err) {
        showSubmitError(err?.message || t('errGeneric'));
      }
    }

    function launchConfetti() {
      const colors = ['#818CF8', '#22D3EE', '#F472B6', '#34D399', '#FBBF24', '#A78BFA'];
      for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top  = '-20px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width  = (6 + Math.random() * 10) + 'px';
        el.style.height = (6 + Math.random() * 10) + 'px';
        el.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
        el.style.animationDelay   = (Math.random() * 0.8) + 's';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

        <div class="page-bg" style="background-image:url('images/graffiti-bg.jpg');background-position:center center"></div>
        <div class="page-overlay" style="background:rgba(5,8,20,0.82)"></div>
        <div style="position:relative;z-index:2;max-width:540px;width:100%">
          <div class="card" style="padding:32px 28px;background:rgba(8,12,30,0.88);border-color:rgba(255,255,255,0.1)" id="q-card">
            ${questionCardHTML()}
          </div>
        </div>
      </div>`;
    }

    function renderExtra() {
      return `
      <div class="screen-wrap" style="min-height:100dvh">
        <div style="max-width:500px;width:100%;display:flex;flex-direction:column;gap:28px">

          <div style="text-align:center">
            <div style="font-size:2.2rem;margin-bottom:14px">💬</div>
            <h2 class="display" style="font-size:1.9rem;font-weight:700;letter-spacing:-0.02em;margin:0;color:var(--text)">${t('addTitle')}</h2>
          </div>

          <div class="card" style="padding:24px;display:flex;flex-direction:column;gap:14px">
            <textarea id="extra-text" class="input" placeholder="${t('addPh')}" rows="5">${S.additionalText}</textarea>
            <div id="extra-error" class="error-msg" style="display:none"></div>
            <button id="submit-btn" class="btn-primary" data-action="submitresp">${t('submitBtn')}</button>
            <button class="btn-ghost" data-action="skipextra">${t('skipBtn')}</button>
          </div>

        </div>
      </div>`;
    }

    function renderThankyou() {
      return `
      <div class="screen-wrap" style="min-height:100dvh">
        <div style="max-width:440px;width:100%;display:flex;flex-direction:column;align-items:center;gap:22px;text-align:center">

          <div class="pop-in" style="width:104px;height:104px;background:linear-gradient(135deg,var(--primary-deep),var(--primary) 55%,var(--cyan));border-radius:32px;display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 20px 60px var(--primary-glow),0 0 40px rgba(34,211,238,0.14)">🎉</div>

          <h2 class="display float-up float-up-1" style="font-size:2.1rem;font-weight:700;letter-spacing:-0.02em;margin:0;color:var(--text)">${t('doneTitle')}</h2>
          <p class="float-up float-up-2" style="color:var(--text-mid);font-size:0.97rem;margin:0;line-height:1.68;max-width:340px">${t('doneMsg')}</p>

          <div class="float-up float-up-3" style="width:100%;margin-top:8px;display:flex;flex-direction:column;gap:10px">
            <button class="btn-primary" data-action="public">${t('seeWhatPeopleSaid')}</button>
            <button class="btn-ghost" data-action="restart">${t('doneAgain')}</button>
          </div>

        </div>
      </div>`;
    }

    // ── Results helpers ────────────────────────────────
    function getQuestionText(questionId) {
      for (const cat of Object.values(QUESTIONS)) {
        const q = cat.find(q => q.id === questionId);
        if (q) return q.question[S.lang] || q.question.en;
      }
      return questionId;
    }

    function getChoiceText(questionId, choiceIndex) {
      for (const cat of Object.values(QUESTIONS)) {
        const q = cat.find(q => q.id === questionId);
        if (q && q.choices[choiceIndex]) {
          return stripEmoji(q.choices[choiceIndex][S.lang] || q.choices[choiceIndex].en);
        }
      }
      return `Option ${choiceIndex + 1}`;
    }

    function getInitial(name) {
      const trimmed = (name || '').trim();
      if (!trimmed) return '?';
      const ch = trimmed[0];
      return ch.toUpperCase ? ch.toUpperCase() : ch;
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function renderResponseCard(resp) {
      const date = new Date(resp.submitted_at).toLocaleDateString(
        S.lang === 'ar' ? 'ar' : 'en-US',
        { year: 'numeric', month: 'short', day: 'numeric' }
      );
      const relLabel = resp.relationship_type === 'both' ? t('relBoth') : t('relSocial');
      const name = resp.respondent_name || '—';

      const qas = (resp.answers || [])
        .slice()
        .sort((a, b) => a.question_id.localeCompare(b.question_id))
        .map(a => {
          const qText = getQuestionText(a.question_id);
          const aText = a.choice_index === 3
            ? (a.custom_answer || 'Other')
            : getChoiceText(a.question_id, a.choice_index);
          return `
          <div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px">
            <div style="font-size:0.78rem;color:var(--text-dim);line-height:1.4">${escapeHtml(qText)}</div>
            <div style="font-size:0.95rem;font-weight:600;color:var(--text)">${escapeHtml(aText)}</div>
          </div>`;
        }).join('');

      const feedback = resp.additional_text ? `
        <div style="margin-top:16px;padding:14px 16px;background:rgba(129,140,248,0.06);border-radius:12px;border:1px solid rgba(129,140,248,0.14)">
          <div style="font-size:0.7rem;font-weight:600;color:var(--primary);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:6px">${t('feedbackLabel')}</div>
          <div style="font-size:0.9rem;color:var(--text-mid);line-height:1.62;white-space:pre-wrap">${escapeHtml(resp.additional_text)}</div>
        </div>` : '';

      return `
      <div class="card" style="padding:22px 24px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="flex:0 0 auto;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary-deep),var(--primary) 60%,var(--cyan));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.05rem;letter-spacing:-0.01em;box-shadow:0 6px 18px var(--primary-glow)">${escapeHtml(getInitial(name))}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:0.98rem;font-weight:700;color:var(--text);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(name)}</div>
            <div style="display:flex;gap:10px;align-items:center;margin-top:2px">
              <span style="font-size:0.7rem;font-weight:600;color:var(--primary);letter-spacing:0.06em;text-transform:uppercase">${escapeHtml(relLabel)}</span>
              <span style="width:3px;height:3px;background:var(--text-dim);border-radius:50%"></span>
              <span style="font-size:0.76rem;color:var(--text-dim);white-space:nowrap">${date}</span>
            </div>
          </div>
        </div>
        ${qas}
        ${feedback}
      </div>`;
    }

    function renderPublic() {
      setTimeout(loadPublicData, 0);
      return `
      <div class="screen-wrap" style="min-height:100dvh;padding-top:40px;padding-bottom:40px;justify-content:flex-start">
        <div style="max-width:640px;width:100%;display:flex;flex-direction:column;gap:20px">

          <div style="display:flex;align-items:center;gap:16px;margin-bottom:4px">
            <button class="btn-ghost" data-action="back-results" style="width:auto;padding:9px 16px;font-size:0.85rem">${t('back')}</button>
            <h1 class="display" style="font-size:1.6rem;font-weight:700;margin:0;letter-spacing:-0.02em">${t('publicTitle')}</h1>
          </div>

          <div id="public-content">
            <div style="text-align:center;padding:80px 0">
              <div class="spinner" style="width:28px;height:28px;display:inline-block;border-width:2.5px"></div>
            </div>
          </div>

        </div>
      </div>`;
    }

    async function loadPublicData() {
      const el = document.getElementById('public-content');
      if (!el) return;

      // 1. Fetch the PII-stripped responses view (no email, no respondent_id)
      const { data: responses, error: re } = await sb
        .from('responses_public')
        .select('id, respondent_name, relationship_type, additional_text, submitted_at')
        .order('submitted_at', { ascending: false });

      if (re) {
        el.innerHTML = `<div class="error-msg">${escapeHtml(re.message)}</div>`;
        return;
      }

      if (!responses || responses.length === 0) {
        el.innerHTML = `
          <div style="text-align:center;padding:80px 0;color:var(--text-dim)">
            <div style="font-size:2rem;margin-bottom:14px">📭</div>
            <div style="font-size:1rem;font-weight:500">${t('publicEmpty')}</div>
          </div>`;
        return;
      }

      // 2. Fetch answers for those response ids and merge client-side
      //    (separate query because PostgREST FK joins don't traverse a view)
      const ids = responses.map(r => r.id);
      const { data: answers, error: ae } = await sb
        .from('answers')
        .select('response_id, question_id, choice_index, custom_answer')
        .in('response_id', ids);

      if (ae) {
        el.innerHTML = `<div class="error-msg">${escapeHtml(ae.message)}</div>`;
        return;
      }

      const byResponse = new Map();
      for (const a of (answers || [])) {
        if (!byResponse.has(a.response_id)) byResponse.set(a.response_id, []);
        byResponse.get(a.response_id).push(a);
      }
      for (const r of responses) r.answers = byResponse.get(r.id) || [];

      el.innerHTML = `
        <div style="font-size:0.85rem;color:var(--text-dim);margin-bottom:4px">${t('publicCount', responses.length)}</div>
        ${responses.map(r => renderResponseCard(r)).join('')}`;
    }

    // ── Event binding ──────────────────────────────────
    function bindChoices() {
      document.querySelectorAll('[data-choice]').forEach(btn => {
        btn.addEventListener('click', () => {
          S.selectedIdx = parseInt(btn.dataset.choice);
          document.querySelectorAll('[data-choice]').forEach(b => {
            b.classList.toggle('selected', parseInt(b.dataset.choice) === S.selectedIdx);
          });
          const otherWrap = document.getElementById('other-wrap');
          const otherInput = document.getElementById('other-input');
          if (otherWrap) {
            if (S.selectedIdx === 3) {
              otherWrap.style.display = '';
              if (otherInput) otherInput.focus();
            } else {
              otherWrap.style.display = 'none';
            }
          }
          const nextBtn = document.getElementById('next-btn');
          if (nextBtn) nextBtn.disabled = false;
        });
      });
    }

    function bindEvents() {
      document.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', (e) => handleAction(e.currentTarget));
      });
      bindChoices();

      const nameInp  = document.getElementById('inp-name');
      const emailInp = document.getElementById('inp-email');

      // Respondent info: Enter on name moves to email, Enter on email submits
      if (nameInp)  nameInp.addEventListener('keydown',  e => { if (e.key === 'Enter') document.getElementById('inp-email')?.focus(); });
      if (emailInp && nameInp) emailInp.addEventListener('keydown', e => { if (e.key === 'Enter') doRespondentInfoSubmit(); });
    }

    async function handleAction(el) {
      const action = el.dataset.action;
      const val    = el.dataset.val;

      switch (action) {
        case 'lang': {
          setLang(val);
          go(renderLanding);
          break;
        }
        case 'gostart': {
          go(renderRespondentInfo);
          break;
        }
        case 'back': {
          go(renderLanding, -1);
          break;
        }
        case 'submitinfo': {
          doRespondentInfoSubmit();
          break;
        }
        case 'public': {
          go(renderPublic);
          break;
        }
        case 'selectrel': {
          S.rel = val;
          S.qIndex = 0;
          S.answers = [];
          S.selectedIdx = null;
          S.otherText = '';
          S.additionalText = '';
          await loadQuestions();
          go(renderQuestion);
          break;
        }
        case 'nextq': {
          if (S.selectedIdx === null) return;
          const q = S.questions[S.qIndex];
          const otherText = S.selectedIdx === 3 ? (document.getElementById('other-input')?.value?.trim() || '') : '';
          const existing = S.answers.findIndex(a => a.questionId === q.id);
          const entry = { questionId: q.id, choiceIndex: S.selectedIdx, otherText };
          if (existing >= 0) S.answers[existing] = entry; else S.answers.push(entry);

          if (S.qIndex < S.questions.length - 1) {
            S.qIndex++;
            const prevAnswer = S.answers.find(a => a.questionId === S.questions[S.qIndex].id);
            S.selectedIdx = prevAnswer?.choiceIndex ?? null;
            S.otherText = prevAnswer?.otherText ?? '';
            await slideQuestion(1);
          } else {
            S.selectedIdx = null;
            S.otherText = '';
            go(renderExtra);
          }
          break;
        }
        case 'submitresp': {
          S.additionalText = document.getElementById('extra-text')?.value || '';
          await submitResponse();
          break;
        }
        case 'skipextra': {
          S.additionalText = '';
          await submitResponse();
          break;
        }
        case 'restart': {
          S.rel = null; S.qIndex = 0; S.answers = []; S.selectedIdx = null; S.additionalText = ''; S.otherText = '';
          go(renderRespondentInfo);
          break;
        }
        case 'back-results': {
          go(renderLanding, -1);
          break;
        }
      }
    }

    // ── Form helpers ───────────────────────────────────
    function doRespondentInfoSubmit() {
      const name  = document.getElementById('inp-name')?.value?.trim()  || '';
      const email = document.getElementById('inp-email')?.value?.trim() || '';
      const errEl = document.getElementById('info-error');

      if (!name) {
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = t('errName'); }
        return;
      }
      if (!email.includes('@')) {
        if (errEl) { errEl.style.display = 'block'; errEl.textContent = t('errEmail'); }
        return;
      }

      S.respondentName  = name;
      S.respondentEmail = email;
      go(renderRelationship);
    }

    // ══════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════

    function init() {
      const savedLang = localStorage.getItem('vc_lang');
      if (savedLang) setLang(savedLang);
      go(savedLang ? renderLanding : renderLanguage);
    }

    init();
  </script>
</body>
</html>
